<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.25)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#070511"/>
  <!-- Subtle glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>
  <!-- S letter -->
  <text x="7.5" y="24" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" fill="url(#sg)">S</text>
  <!-- Sparkle dots -->
  <circle cx="27" cy="6"  r="1.3" fill="#C084FC" opacity="0.9"/>
  <circle cx="5"  cy="7"  r="0.9" fill="#22D3EE" opacity="0.8"/>
  <circle cx="27" cy="25" r="0.8" fill="#818CF8" opacity="0.7"/>
  <circle cx="24" cy="4"  r="0.6" fill="#C084FC" opacity="0.5"/>
</svg>
