AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: The Big Idea — Dropshipping Research Platform API

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 512
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        OPENAI_API_KEY: !Ref OpenAIApiKey
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        STRIPE_PRO_PRICE_ID: !Ref StripeProPriceId
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId
        COGNITO_REGION: !Ref AWS::Region
        FRONTEND_URL: !Ref FrontendUrl

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
  OpenAIApiKey:
    Type: String
    NoEcho: true
  StripeSecretKey:
    Type: String
    NoEcho: true
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: "placeholder"
  StripeProPriceId:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  FrontendUrl:
    Type: String
    Default: "https://localhost:3000"
  ResendApiKey:
    Type: String
    NoEcho: true
    Description: Resend transactional email API key

Resources:
  # ─── KMS key — Cognito encrypts verification codes with this ─────────────────
  CognitoEmailKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Cognito CustomEmailSender encryption key for Sourcery
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          # Account root — full control so the key is never orphaned
          - Sid: RootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          # Cognito — encrypt only
          - Sid: CognitoEncrypt
            Effect: Allow
            Principal:
              Service: cognito-idp.amazonaws.com
            Action:
              - kms:GenerateDataKey
              - kms:Encrypt
            Resource: "*"
          # Email sender Lambda — decrypt only
          - Sid: LambdaDecrypt
            Effect: Allow
            Principal:
              AWS: !GetAtt EmailSenderFunctionRole.Arn
            Action: kms:Decrypt
            Resource: "*"

  CognitoEmailKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/sourcery-cognito-email
      TargetKeyId: !Ref CognitoEmailKmsKey

  # ─── Email Sender Lambda (Cognito CustomEmailSender trigger) ─────────────────
  EmailSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: the-big-idea-email-sender
      CodeUri: ../email_sender/
      Handler: handler.lambda_handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 256
      Description: Cognito custom email sender — sends branded emails via Resend
      Role: !GetAtt EmailSenderFunctionRole.Arn
      Environment:
        Variables:
          RESEND_API_KEY: !Ref ResendApiKey
          KMS_KEY_ARN: !GetAtt CognitoEmailKmsKey.Arn
          FROM_ADDRESS: "Sourcery <onboarding@resend.dev>"

  EmailSenderFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: the-big-idea-email-sender-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KmsDecrypt
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: kms:Decrypt
                Resource: !GetAtt CognitoEmailKmsKey.Arn

  # Allow Cognito to invoke the email sender Lambda
  EmailSenderLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt EmailSenderFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"

  # ─── API Lambda ─────────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: the-big-idea-api
      CodeUri: ../backend/
      Handler: app.main.handler
      Description: The Big Idea FastAPI backend
      Events:
        ApiProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref ApiGateway
        RootPath:
          Type: Api
          Properties:
            Path: /
            Method: ANY
            RestApiId: !Ref ApiGateway

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: the-big-idea-api
      StageName: prod
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date'"
        AllowOrigin: "'*'"
      BinaryMediaTypes:
        - "image/*"
        - "application/octet-stream"

  # ─── Scraper Lambda (scheduled) ──────────────────────────────────────────────
  ScraperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: the-big-idea-scraper
      CodeUri: ../scrapers/
      Handler: scheduler.handler.lambda_handler
      Timeout: 900  # 15 minutes
      MemorySize: 1024
      Description: Scheduled product scraper
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Name: big-idea-scraper-schedule
            Description: Run scrapers every 6 hours
            Enabled: true

  # ─── SQS Queue for on-demand scraping ────────────────────────────────────────
  OnDemandScrapeQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: the-big-idea-scrape-queue
      VisibilityTimeout: 900
      MessageRetentionPeriod: 3600

  # ─── S3 Bucket for report snapshots ─────────────────────────────────────────
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "the-big-idea-reports-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: TheBigIdeaApiEndpoint

  ScraperFunctionArn:
    Description: Scraper Lambda ARN
    Value: !GetAtt ScraperFunction.Arn

  SqsQueueUrl:
    Description: On-demand scrape queue URL
    Value: !Ref OnDemandScrapeQueue

  EmailSenderFunctionArn:
    Description: Email sender Lambda ARN (set as Cognito CustomEmailSender trigger)
    Value: !GetAtt EmailSenderFunction.Arn

  CognitoEmailKmsKeyArn:
    Description: KMS key ARN for Cognito email encryption
    Value: !GetAtt CognitoEmailKmsKey.Arn
